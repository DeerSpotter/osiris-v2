name: Deploy OSIRIS GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'src/aeris/**'
      - 'workers/osiris-flight-proxy/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/aeris/package-lock.json

      - name: Build static Aeris app
        working-directory: src/aeris
        env:
          NEXT_PUBLIC_AERIS_BASE_PATH: /osiris-v2/aeris
          NEXT_PUBLIC_OSIRIS_FLIGHT_PROXY: https://osiris-v2.spotterdeer.workers.dev
        run: |
          npm ci
          rm -rf src/app/api
          npm run build
          rm -rf ../../docs/aeris
          mkdir -p ../../docs/aeris
          cp -R out/. ../../docs/aeris/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

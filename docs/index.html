<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#d4af37">
  <title>OSIRIS — Global Map Command</title>
  <meta name="description" content="OSIRIS interactive global map for GitHub Pages.">
  <meta name="github-pages-fallback" content="root index.html redirects to docs for branch based Pages deployments.">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css">
  <link rel="stylesheet" href="./styles.css?v=20260614-clean-map-controller">
  <style id="osirisNoLegacyGlobe">
    #globeCanvas.globe-canvas{display:none!important;opacity:0!important;visibility:hidden!important;pointer-events:none!important;}
  </style>
</head>
<body>
  <div class="boot" id="boot" aria-live="polite">
    <div class="boot-noise"></div>
    <div class="boot-mark">OSIRIS</div>
    <div class="boot-sequence" id="bootSequence">INITIALIZING GLOBAL MAP...</div>
  </div>

  <main class="osiris-live" aria-label="OSIRIS interactive global map">
    <canvas id="globeCanvas" class="globe-canvas" aria-hidden="true"></canvas>
    <div class="space-vignette" aria-hidden="true"></div>
    <div class="scan-lines" aria-hidden="true"></div>

    <header class="live-header">
      <div class="brand-row">
        <h1>OSIRIS</h1>
        <p>GLOBAL MAP COMMAND</p>
        <a class="support-pill" href="https://github.com/DeerSpotter/osiris-v2" target="_blank" rel="noreferrer">● SUPPORT PROJECT</a>
      </div>
      <div class="system-copy">POWERED BY OSIRIS OPEN SOURCE MAP ENGINE</div>
    </header>

    <section class="telemetry-card" aria-label="Live telemetry">
      <span id="zulu">ZULU --:--:--Z</span>
      <span>SYS <strong id="systemState">LOADING</strong></span>
      <span><strong id="feedCount">0</strong> FEEDS</span>
      <span id="readout">LOADING REPO CACHE</span>
    </section>

    <section class="event-card" aria-label="Selected event">
      <span class="event-kicker">RECON LAYER</span>
      <strong id="eventTitle">CONNECTING TO REPO DATA CACHE</strong>
      <span id="eventMeta">PINCH OR WHEEL TO ZOOM · TAP A NODE</span>
    </section>

    <div class="floating-actions" aria-label="Map controls">
      <button type="button" id="locateBtn" aria-label="Focus North America"><span class="pin-icon"></span></button>
      <button type="button" id="orbitBtn" aria-label="Toggle repository routes"><span class="orbit-icon"></span></button>
    </div>

    <nav class="bottom-nav" aria-label="OSIRIS navigation">
      <button type="button" data-layer="layers"><span class="nav-icon">▱</span><small>LAYERS</small></button>
      <button type="button" data-layer="markets"><span class="nav-icon">▥</span><small>MARKETS</small></button>
      <button type="button" data-layer="intel"><span class="nav-icon">▤</span><small>INTEL</small></button>
      <button type="button" class="active" data-layer="recon"><span class="nav-icon">◎</span><small>RECON</small></button>
      <button type="button" data-layer="search"><span class="nav-icon">⌕</span><small>SEARCH</small></button>
    </nav>
  </main>

  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <script src="./osiris-live-cache.js?v=20260614-fast-map-rollback"></script>
  <script src="./osiris-panel-selection.js?v=20260614-fast-map-rollback"></script>
  <script src="./osiris-flight-worker-live.js?v=20260614-aeris-request-budget"></script>
  <script src="./osiris-map-controller.js?v=20260614-popup-focus-routes"></script>
  <script src="./osiris-aeris-mode.js?v=20260614-aeris-layer-toggles"></script>
  <script src="./osiris-aeris-skin.js?v=20260614-aeris-upload-skin"></script>
  <script src="./osiris-aeris-controls-fix.js?v=20260614-aeris-controls-stable"></script>
  <script src="./osiris-aeris-polish.js?v=20260614-aeris-polish-stable"></script>
  <script src="./osiris-aeris-animation.js?v=20260614-aeris-smooth-animation"></script>
  <script src="./osiris-maritime-routes-patch.js?v=20260614-maritime-lowzoom-restore"></script>
  <script src="./osiris-route-visibility-slider.js?v=20260614-route-visibility-slider"></script>
  <script src="./osiris-satellite-toggle.js?v=20260614-native-globe-satellite"></script>
  <script src="./osiris-aeris-interactions.js?v=20260614-aeris-interactions-stable"></script>
</body>
</html>
